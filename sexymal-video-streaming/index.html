    <script>
      // Silence cross-origin or third-party/ad script errors that get blocked or fail under sandboxes
      window.addEventListener('error', function(e) {
        if (e.message === 'Script error.' || (e.filename && !e.filename.includes(window.location.host))) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return true;
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && e.reason.message.includes('Script error.')) {
          e.preventDefault();
        }
      });
    </script>
